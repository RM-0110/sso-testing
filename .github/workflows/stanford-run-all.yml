name: Stanford SSO - Run All

on:
  workflow_dispatch:

jobs:

  chrome:
    uses: ./.github/workflows/stanford-chrome.yml

  firefox:
    needs: chrome
    uses: ./.github/workflows/stanford-firefox.yml

  edge:
    needs: firefox
    uses: ./.github/workflows/stanford-edge.yml

  safari:
    needs: edge
    uses: ./.github/workflows/stanford-safari.yml

  summary:

    needs:
      - chrome
      - firefox
      - edge
      - safari

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Chrome Result
        uses: actions/download-artifact@v4
        with:
          name: browser-result-chrome
          path: results

      - name: Download Firefox Result
        uses: actions/download-artifact@v4
        with:
          name: browser-result-firefox
          path: results

      - name: Download Edge Result
        uses: actions/download-artifact@v4
        with:
          name: browser-result-edge
          path: results

      - name: Download Safari Result
        uses: actions/download-artifact@v4
        with:
          name: browser-result-safari
          path: results

      - name: Send Summary Email
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          python scripts/build_summary.py
