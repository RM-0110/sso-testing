name: Stanford SSO Test

on:
workflow_dispatch:

jobs:
sso-test:
strategy:
fail-fast: false

```
  matrix:
    include:
      - browser: chrome
        os: windows-latest

      - browser: firefox
        os: windows-latest

      - browser: edge
        os: windows-latest

      - browser: safari
        os: macos-latest

runs-on: ${{ matrix.os }}

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Install Browser Drivers (Windows)
    if: runner.os == 'Windows'
    run: |
      seleniumbase install chromedriver
      seleniumbase install geckodriver
      seleniumbase install edgedriver

  - name: Verify Safari Driver (macOS)
    if: runner.os == 'macOS'
    run: |
      safaridriver --version

  - name: Run Stanford SSO Test
    env:
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
      MS_USERNAME: ${{ secrets.MS_USERNAME }}
      MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
    run: pytest tests/test_stanford_sso.py -s --browser=${{ matrix.browser }} --headless --html=report.html --self-contained-html

  - name: Upload Test Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: selenium-report-${{ matrix.browser }}
      path: |
        report.html
        latest_logs/
```
