name: Stanford SSO - Safari

on:
  workflow_call:
  workflow_dispatch:

jobs:
  safari-test:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Safari Driver
        run: |
          safaridriver --version

      - name: Run Stanford SSO Test (Safari)
        env:
          TEST_BROWSER: safari
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: pytest tests/test_stanford_sso.py -s --browser=safari --html=report.html --self-contained-html

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-safari
          path: |
            report.html
            latest_logs/

      - name: Upload Browser Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-result-safari
          path: results/
