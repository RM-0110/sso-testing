name: Stanford SSO - Edge

on:
  workflow_dispatch:

jobs:
  edge-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Edge Driver
        shell: bash
        run: |
          seleniumbase install edgedriver

      - name: Run Stanford SSO Test (Edge)
        env:
          TEST_BROWSER: edge
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: pytest tests/test_stanford_sso.py -s --browser=edge --html=report.html --self-contained-html

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-edge
          path: |
            report.html
            latest_logs/

      - name: Upload Browser Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-result-edge
          path: results/
